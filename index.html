<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Habit & Task Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1 id="monthYear">June 2026</h1>
                <button id="themeToggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            <div class="nav-buttons">
                <button id="prevMonth"><i class="fas fa-chevron-left"></i> Previous</button>
                <button id="nextMonth">Next <i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="today-date">
                <span>Today's Date:</span>
                <strong id="todayDate">21 June 2026</strong>
            </div>
        </header>

        <div class="graph-container">
            <canvas id="progressChart"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #2ECC71, #27AE60);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="totalCompleted">0</div>
                    <div class="stat-label">Total Completed</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #E74C3C, #C0392B);">
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="totalMissed">0</div>
                    <div class="stat-label">Total Missed</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #3498DB, #2980B9);">
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-label">Current Streak</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #F39C12, #E67E22);">
                    <i class="fas fa-fire"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="bestStreak">0</div>
                    <div class="stat-label">Best Streak</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #9B59B6, #8E44AD);">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value" id="completionPercent">0%</div>
                    <div class="stat-label">Monthly %</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="calendar-section">
                <div class="section-header">
                    <h2>Calendar</h2>
                </div>
                <div id="calendar" class="calendar"></div>
            </div>

            <div class="tasks-section">
                <div class="section-header">
                    <h2 id="selectedDateTitle">21 June 2026</h2>
                    <div class="task-controls">
                        <input type="text" id="searchTask" placeholder="Search tasks..." class="search-input">
                        <select id="filterTasks" class="filter-select">
                            <option value="all">All Tasks</option>
                            <option value="completed">Completed</option>
                            <option value="pending">Pending</option>
                        </select>
                    </div>
                </div>
                <div id="tasksList" class="tasks-list"></div>
                <div class="add-task-section">
                    <input type="text" id="newTaskInput" placeholder="Add new recurring task..." class="task-input">
                    <button id="addTaskBtn" class="add-btn">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
                <div class="export-controls">
                    <button id="exportPDF" class="export-btn"><i class="fas fa-file-pdf"></i> Export PDF</button>
                    <button id="exportCSV" class="export-btn"><i class="fas fa-file-csv"></i> Export CSV</button>
                    <button id="importData" class="export-btn"><i class="fas fa-upload"></i> Import</button>
                    <button id="resetMonth" class="reset-btn"><i class="fas fa-redo"></i> Reset Month</button>
                </div>
            </div>
        </div>
    </div>

    <div id="confetti" class="confetti-container"></div>
    <input type="file" id="fileInput" accept=".csv" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
